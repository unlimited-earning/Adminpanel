<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Unlimited Earning</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        :root {
            --primary-color: #007bff;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 25px;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #bbb;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 38px;
            cursor: pointer;
            color: #888;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary-color);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .support-link {
            margin-top: 20px;
            display: block;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }

        .support-link span {
            color: var(--primary-color);
        }

        /* Loading Spinner */
        #loader {
            display: none;
            margin-top: 10px;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>ADMIN PANEL</h2>
    <div class="input-group">
        <label>Admin Number</label>
        <input type="text" id="adminNumber" placeholder="Enter number">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="Enter password">
        <span class="toggle-password" onclick="togglePassword()">👁️</span>
    </div>

    <button class="btn-login" onclick="loginAdmin()">LOGIN</button>
    
    <div id="loader">Processing...</div>

    <a href="#" class="support-link">Need help? Contact <span>Main Admin</span></a>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBFPd0umYUjpFBH08GNhpvjPA00kTh6Y5c",
        authDomain: "unlimited-73d64.firebaseapp.com",
        databaseURL: "https://unlimited-73d64-default-rtdb.firebaseio.com",
        projectId: "unlimited-73d64",
        storageBucket: "unlimited-73d64.firebasestorage.app",
        messagingSenderId: "1089467648940",
        appId: "1:1089467648940:web:ed748a5a93b27ee408c809"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function togglePassword() {
        const passInput = document.getElementById('adminPass');
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
    }

    function loginAdmin() {
        const number = document.getElementById('adminNumber').value.trim();
        const pass = document.getElementById('adminPass').value.trim();
        const loader = document.getElementById('loader');

        if(number === "" || pass === "") {
            alert("Please fill all fields");
            return;
        }

        loader.style.display = "block";

        // 1. Check for Master Admin
        if(number === "01310504728" && pass === "RAFSAN20") {
            sessionStorage.setItem("adminRole", "master");
            sessionStorage.setItem("adminLoggedIn", "true");
            window.location.href = "home_admin.html";
            return;
        }

        // 2. Check for Support Admin in Database
        database.ref('support_admins').orderByChild('number').equalTo(number).once('value', snapshot => {
            if(snapshot.exists()) {
                let found = false;
                snapshot.forEach(childSnapshot => {
                    const data = childSnapshot.val();
                    if(data.password === pass) {
                        found = true;
                        sessionStorage.setItem("adminRole", "support");
                        sessionStorage.setItem("adminID", childSnapshot.key);
                        sessionStorage.setItem("adminLoggedIn", "true");
                        // Store permissions for support admin
                        sessionStorage.setItem("permissions", JSON.stringify(data.panels));
                        window.location.href = "home_admin.html";
                    }
                });
                if(!found) {
                    alert("Incorrect Password!");
                    loader.style.display = "none";
                }
            } else {
                alert("Admin not found!");
                loader.style.display = "none";
            }
        });
    }

    // Check if already logged in
    window.onload = function() {
        if(sessionStorage.getItem("adminLoggedIn") === "true") {
            window.location.href = "home_admin.html";
        }
    }
</script>

</body>
</html>
