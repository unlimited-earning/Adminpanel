<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Failed Panel - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --danger: #dc3545;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            padding: 15px;
        }

        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: var(--primary); font-size: 20px; margin-right: 15px; }

        .search-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .search-container h4 { margin-top: 0; color: var(--danger); border-bottom: 1px solid #222; padding-bottom: 10px; }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            outline: none;
        }

        .search-btn {
            padding: 0 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Result Display */
        #resultArea {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .task-info-card {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid var(--danger);
            margin-bottom: 15px;
        }

        .info-row { font-size: 14px; margin-bottom: 5px; color: #ccc; }
        .info-row b { color: var(--text-main); }

        .failed-action {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .final-btn {
            padding: 15px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .final-btn:disabled { background: #444; cursor: not-allowed; }

        .status-msg { font-size: 13px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <a href="home_admin.html" class="back-btn">⬅</a>
    <h3>Failed Management</h3>
</div>

<div class="search-container">
    <h4>Search Task to Fail</h4>
    <div class="search-box">
        <input type="email" id="emailSearch" placeholder="Enter Gmail to verify...">
        <button class="search-btn" onclick="verifyEmail()">VERIFY</button>
    </div>

    <!-- Found Content -->
    <div id="resultArea">
        <div class="task-info-card">
            <div class="info-row"><b>User:</b> <span id="uName"></span></div>
            <div class="info-row"><b>Number:</b> <span id="uNum"></span></div>
            <div class="info-row"><b>Gmail:</b> <span id="tEmail"></span></div>
            <div class="info-row"><b>Password:</b> <span id="tPass"></span></div>
        </div>

        <div class="failed-action">
            <p style="color: #888; font-size: 12px; text-align: center;">Clicking below will reject the task and notify the user.</p>
            <button class="final-btn" id="failedBtn" onclick="markAsFailed()">MARK AS FAILED</button>
        </div>
    </div>

    <div id="statusMsg" class="status-msg"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBFPd0umYUjpFBH08GNhpvjPA00kTh6Y5c",
        authDomain: "unlimited-73d64.firebaseapp.com",
        databaseURL: "https://unlimited-73d64-default-rtdb.firebaseio.com",
        projectId: "unlimited-73d64",
        storageBucket: "unlimited-73d64.firebasestorage.app",
        messagingSenderId: "1089467648940",
        appId: "1:1089467648940:web:ed748a5a93b27ee408c809"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentTaskId = "";
    let currentUserUid = "";
    let currentTaskData = null;

    // 1. Verify Email in Review Node
    function verifyEmail() {
        const email = document.getElementById('emailSearch').value.trim();
        const resArea = document.getElementById('resultArea');
        const status = document.getElementById('statusMsg');

        if(!email) return;

        status.innerText = "Searching...";
        resArea.style.display = "none";

        db.ref('task_reviews').orderByChild('email').equalTo(email).once('value', snap => {
            if(snap.exists()) {
                snap.forEach(child => {
                    currentTaskId = child.key;
                    currentTaskData = child.val();
                    currentUserUid = currentTaskData.uid;

                    // Display info
                    document.getElementById('uName').innerText = currentTaskData.userName;
                    document.getElementById('uNum').innerText = currentTaskData.userNumber;
                    document.getElementById('tEmail').innerText = currentTaskData.email;
                    document.getElementById('tPass').innerText = currentTaskData.password;
                    
                    resArea.style.display = "block";
                    status.innerText = "Task Found in Review!";
                    status.style.color = "#28a745";
                });
            } else {
                status.innerText = "No pending task found with this email.";
                status.style.color = "#dc3545";
            }
        });
    }

    // 2. Mark as Failed Logic
    function markAsFailed() {
        const btn = document.getElementById('failedBtn');

        if(!confirm("Are you sure you want to fail this task?")) return;

        btn.disabled = true;
        btn.innerText = "Processing Reject...";

        // 2-second lock
        setTimeout(() => {
            // Step 1: Update User Stats (increment failedCount)
            db.ref('users/' + currentUserUid + '/failedCount').transaction(count => {
                return (count || 0) + 1;
            }).then(() => {
                // Step 2: Add to User History
                db.ref('history/' + currentUserUid).push({
                    type: "Gmail Rejected",
                    amount: 0,
                    email: currentTaskData.email,
                    status: "Failed",
                    timestamp: Date.now()
                });

                // Step 3: Remove from Review Node
                db.ref('task_reviews').child(currentTaskId).remove();

                alert("Task Rejected Successfully.");
                location.reload(); // Reset page
            });
        }, 2000);
    }
</script>

</body>
</html>
