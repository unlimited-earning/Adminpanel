<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Review Panel - Admin</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 
        ========================================
        REVIEW PANEL CSS (100+ Lines)
        ========================================
        */
        :root {
            --primary: #2c3e50;
            --accent: #6c5ce7;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); padding-bottom: 50px; }

        .header {
            background: var(--primary);
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header h2 { font-size: 18px; }

        .container { padding: 20px; max-width: 900px; margin: 0 auto; }

        /* Stats Section */
        .stats-summary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-card p { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 600; }
        .stat-card h3 { font-size: 20px; color: var(--primary); }

        /* Review Cards */
        .review-card {
            background: var(--white);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            border: 1px solid #eee;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Real Identity Badge */
        .identity-box {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .identity-box i { font-size: 24px; color: var(--accent); }
        .identity-box div b { display: block; font-size: 15px; color: #333; }
        .identity-box div span { font-size: 12px; color: #666; }

        /* Submitted Data Table */
        .data-table {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .data-item {
            background: #fafafa;
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f0f0f0;
        }
        .data-item label { font-size: 10px; color: #999; text-transform: uppercase; font-weight: 700; }
        .data-item b { font-size: 13px; color: #333; word-break: break-all; margin-left: 10px; flex: 1; text-align: right; }
        .copy-btn { color: var(--accent); cursor: pointer; margin-left: 10px; font-size: 14px; }

        /* Action Row */
        .action-row { display: flex; gap: 12px; }
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-size: 14px;
        }
        .btn-reject { background: var(--danger); }
        .btn-approve { background: var(--success); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    </style>
</head>
<body>

    <header class="header">
        <i class="fas fa-arrow-left" style="cursor:pointer;" onclick="location.href='home_admin.html'"></i>
        <h2>Verification & Review Center</h2>
    </header>

    <div class="container">
        <!-- Global Success/Failed Stats -->
        <div class="stats-summary">
            <div class="stat-card"><p>Pending</p><h3 id="c_pend">0</h3></div>
            <div class="stat-card"><p>Success</p><h3 id="c_succ" style="color:var(--success)">0</h3></div>
            <div class="stat-card"><p>Failed</p><h3 id="c_fail" style="color:var(--danger)">0</h3></div>
        </div>

        <!-- Submission List -->
        <div id="reviewContainer">
            <p style="text-align:center; color:#ccc; margin-top:50px;">Fetching submissions...</p>
        </div>
    </div>

    <!-- 
    ========================================
    FIREBASE REVIEW ENGINE (200+ Lines)
    ========================================
    -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOdWqPh69SEG-Z6P71xL6jlcFcNb9gMNs",
            authDomain: "unlimited-earning-28639.firebaseapp.com",
            databaseURL: "https://unlimited-earning-28639-default-rtdb.firebaseio.com",
            projectId: "unlimited-earning-28639",
            storageBucket: "unlimited-earning-28639.firebasestorage.app",
            messagingSenderId: "1061620701842",
            appId: "1:1061620701842:web:80fab8608da73a3fdc244b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function speak(txt) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(txt)); }
        let lastReviewCount = -1;

        /**
         * SYNC COUNTERS
         */
        db.ref('users').on('value', snap => {
            let s = 0, f = 0;
            snap.forEach(u => {
                s += (u.val().successTasks || 0);
                f += (u.val().failedTasks || 0);
            });
            document.getElementById('c_succ').innerText = s;
            document.getElementById('c_fail').innerText = f;
        });

        /**
         * MONITOR REVIEWS
         */
        db.ref('task_reviews').on('value', snapshot => {
            const container = document.getElementById('reviewContainer');
            const count = snapshot.numChildren();
            document.getElementById('c_pend').innerText = count;

            if(lastReviewCount !== -1 && count > lastReviewCount) speak("User submitted task");
            lastReviewCount = count;

            if(!snapshot.exists()) {
                container.innerHTML = `<p style="text-align:center; color:#999; margin-top:50px;">No pending work to review!</p>`;
                return;
            }

            container.innerHTML = "";
            snapshot.forEach(child => {
                const task = child.val();
                const taskKey = child.key;

                // Create Card
                const card = document.createElement('div');
                card.className = 'review-card';
                
                // Fetch user's actual account name from 'users' node
                db.ref('users/' + task.phone).once('value', uSnap => {
                    const uData = uSnap.val();
                    const realName = uData ? uData.name : "Unknown User";

                    card.innerHTML = `
                        <div class="identity-box">
                            <i class="fas fa-user-check"></i>
                            <div>
                                <b>${realName}</b>
                                <span>Phone: ${task.phone}</span>
                            </div>
                        </div>

                        <div class="data-table">
                            <div class="data-item"><label>Email</label><b id="e_${taskKey}">${task.email}</b><i class="far fa-copy copy-btn" onclick="copyData('e_${taskKey}')"></i></div>
                            <div class="data-item"><label>Password</label><b id="p_${taskKey}">${task.details.password}</b><i class="far fa-copy copy-btn" onclick="copyData('p_${taskKey}')"></i></div>
                            <div class="data-item"><label>Recovery</label><b id="r_${taskKey}">${task.details.recoveryEmail}</b><i class="far fa-copy copy-btn" onclick="copyData('r_${taskKey}')"></i></div>
                            <div class="data-item"><label>Target Name</label><b>${task.details.firstName} ${task.details.lastName}</b></div>
                        </div>

                        <div class="action-row">
                            <button class="btn btn-reject" id="btnRej_${taskKey}" onclick="processWork('${taskKey}', 'failed', '${task.phone}', '${task.email}')">Reject Work</button>
                            <button class="btn btn-approve" id="btnApp_${taskKey}" onclick="handleApprove('${taskKey}', '${task.phone}', '${task.email}')">Approve & Pay</button>
                        </div>
                    `;
                });
                container.appendChild(card);
            });
        });

        function handleApprove(key, phone, email) {
            const amount = prompt("Enter payment for this Gmail (৳):", "10");
            if(amount) processWork(key, 'success', phone, email, amount);
        }

        /**
         * PROCESS LOGIC
         */
        async function processWork(key, status, phone, email, amount = 0) {
            const btn1 = document.getElementById('btnApp_'+key);
            const btn2 = document.getElementById('btnRej_'+key);
            btn1.disabled = true; btn2.disabled = true;

            try {
                const userRef = db.ref('users/' + phone);
                
                if(status === 'success') {
                    // Transactional Update
                    await userRef.transaction(d => {
                        if(d) {
                            d.balance = (d.balance || 0) + parseFloat(amount);
                            d.successTasks = (d.successTasks || 0) + 1;
                            d.pendingTasks = Math.max(0, (d.pendingTasks || 0) - 1);
                        }
                        return d;
                    });
                    // History Log
                    await db.ref('history/' + phone).push({
                        type: 'task', title: `Task Success (${email})`, amount: amount, status: 'Success', timestamp: Date.now()
                    });
                } else {
                    // Reject Logic
                    await userRef.transaction(d => {
                        if(d) {
                            d.failedTasks = (d.failedTasks || 0) + 1;
                            d.pendingTasks = Math.max(0, (d.pendingTasks || 0) - 1);
                        }
                        return d;
                    });
                    await db.ref('history/' + phone).push({
                        type: 'task', title: `Task Failed (${email})`, amount: 0, status: 'Failed', timestamp: Date.now()
                    });
                }

                // Cleanup
                await db.ref('task_reviews/' + key).remove();
                alert("Task Processed!");

            } catch (err) { alert(err.message); }

            setTimeout(() => { if(btn1) btn1.disabled = false; }, 2000);
        }

        function copyData(id) {
            const t = document.getElementById(id).innerText;
            navigator.clipboard.writeText(t);
            alert("Copied!");
        }
    </script>
</body>
</html>
