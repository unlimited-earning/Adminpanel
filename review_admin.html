<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Tasks - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            padding: 15px;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-btn { text-decoration: none; color: var(--primary); font-size: 18px; margin-right: 15px; }

        #reviewList {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .review-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border-left: 5px solid #ffc107;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            font-size: 13px;
            gap: 5px;
            margin: 10px 0;
            color: #ddd;
        }

        .details-grid b { color: #888; }

        .user-tag {
            font-size: 12px;
            background: #333;
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--primary);
            margin-bottom: 10px;
            display: inline-block;
        }

        .action-area {
            border-top: 1px solid #333;
            padding-top: 10px;
            margin-top: 10px;
        }

        .amount-input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #444;
            color: #00ff00;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
            box-sizing: border-box;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .approve-btn { background: var(--success); color: white; }
        .reject-btn { background: var(--danger); color: white; }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

    </style>
</head>
<body>

<div class="header">
    <a href="home_admin.html" class="back-btn">⬅</a>
    <h3>Task Reviews</h3>
</div>

<div id="reviewList">
    <!-- Reviews will be loaded here -->
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBFPd0umYUjpFBH08GNhpvjPA00kTh6Y5c",
        authDomain: "unlimited-73d64.firebaseapp.com",
        databaseURL: "https://unlimited-73d64-default-rtdb.firebaseio.com",
        projectId: "unlimited-73d64",
        storageBucket: "unlimited-73d64.firebasestorage.app",
        messagingSenderId: "1089467648940",
        appId: "1:1089467648940:web:ed748a5a93b27ee408c809"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        window.speechSynthesis.speak(msg);
    }

    // Load Reviews
    db.ref('task_reviews').on('value', snap => {
        const list = document.getElementById('reviewList');
        list.innerHTML = "";

        if(!snap.exists()) {
            list.innerHTML = "<p style='text-align:center; color:#555;'>No tasks in review</p>";
            return;
        }

        snap.forEach(child => {
            const data = child.val();
            const revId = child.key;

            const card = document.createElement('div');
            card.className = 'review-card';
            card.innerHTML = `
                <div class="user-tag">User: ${data.userName} (${data.userNumber})</div>
                <div class="details-grid">
                    <div><b>Name:</b> ${data.firstName} ${data.lastName}</div>
                    <div><b>Email:</b> ${data.email}</div>
                    <div><b>Pass:</b> ${data.password}</div>
                    <div><b>Birth:</b> ${data.birthdate}</div>
                    <div style="grid-column: span 2;"><b>Recovery:</b> ${data.recoveryEmail}</div>
                </div>

                <div class="action-area">
                    <input type="number" id="amt_${revId}" class="amount-input" placeholder="Enter Amount (৳)">
                    <div class="btn-group">
                        <button class="approve-btn" id="app_${revId}" onclick="processTask('${revId}', 'success')">APPROVE</button>
                        <button class="reject-btn" id="rej_${revId}" onclick="processTask('${revId}', 'failed')">REJECT</button>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
    });

    // Process Task (Success or Failed)
    function processTask(revId, status) {
        const amount = parseFloat(document.getElementById(`amt_${revId}`).value) || 0;
        const appBtn = document.getElementById(`app_${revId}`);
        const rejBtn = document.getElementById(`rej_${revId}`);

        if(status === 'success' && amount <= 0) {
            alert("Please enter a valid amount!");
            return;
        }

        // Lock buttons for 2 seconds
        appBtn.disabled = true;
        rejBtn.disabled = true;

        setTimeout(() => {
            // Get Task Details first
            db.ref('task_reviews').child(revId).once('value').then(snap => {
                const task = snap.val();
                const userUid = task.uid;

                if(status === 'success') {
                    // 1. Update User Balance & Success Count
                    db.ref('users/' + userUid).transaction(user => {
                        if (user) {
                            user.balance = (user.balance || 0) + amount;
                            user.successCount = (user.successCount || 0) + 1;
                            
                            // Check for Auto-Activation (2 success tasks)
                            if(user.successCount >= 2) {
                                user.status = "active";
                            }
                        }
                        return user;
                    });

                    // 2. Add to History
                    db.ref('history/' + userUid).push({
                        type: "Task Payment",
                        amount: amount,
                        email: task.email,
                        status: "Success",
                        timestamp: Date.now()
                    });

                } else {
                    // Update Failed Count
                    db.ref('users/' + userUid + '/failedCount').transaction(c => (c || 0) + 1);
                    
                    // Add to History
                    db.ref('history/' + userUid).push({
                        type: "Task Failed",
                        amount: 0,
                        email: task.email,
                        status: "Failed",
                        timestamp: Date.now()
                    });
                }

                // 3. Remove from Review List
                db.ref('task_reviews').child(revId).remove();
            });
        }, 2000);
    }

    // Voice notification
    let lastRevCount = 0;
    db.ref('task_reviews').on('value', snap => {
        const count = snap.numChildren();
        if(count > lastRevCount) {
            speak("User task submit kor-e-che");
        }
        lastRevCount = count;
    });

</script>

</body>
</html>
