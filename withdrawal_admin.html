<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Management - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            padding: 15px;
        }

        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: var(--primary); font-size: 18px; margin-right: 15px; }

        /* Settings Section */
        .settings-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .settings-card h4 { margin-top: 0; color: var(--warning); border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        .input-group input {
            width: 100%;
            padding: 8px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .update-btn {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Requests List */
        .req-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--success);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .req-info { font-size: 13px; line-height: 1.6; }
        .req-info b { color: var(--warning); }
        .method-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .tag-recharge { background: #5bc0de; color: #000; }
        .tag-nagad { background: #f0ad4e; color: #000; }
        .tag-bkash { background: #d9534f; color: #fff; }

        .paid-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .paid-btn:disabled { background: #444; cursor: not-allowed; }

    </style>
</head>
<body>

<div class="header">
    <a href="home_admin.html" class="back-btn">⬅</a>
    <h3>Withdrawal Control</h3>
</div>

<!-- Settings Panel -->
<div class="settings-card">
    <h4>Withdrawal Settings</h4>
    <div class="input-row">
        <div class="input-group">
            <label>Min Recharge (৳)</label>
            <input type="number" id="minRecharge" placeholder="20">
        </div>
        <div class="input-group">
            <label>Min Nagad (৳)</label>
            <input type="number" id="minNagad" placeholder="40">
        </div>
        <div class="input-group">
            <label>Min Bkash (৳)</label>
            <input type="number" id="minBkash" placeholder="60">
        </div>
        <div class="input-group">
            <label>Min Active Referral</label>
            <input type="number" id="minRef" placeholder="1">
        </div>
    </div>
    <button class="update-btn" onclick="updateSettings()">UPDATE SETTINGS</button>
</div>

<div id="withdrawList">
    <!-- Pending withdrawals here -->
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBFPd0umYUjpFBH08GNhpvjPA00kTh6Y5c",
        authDomain: "unlimited-73d64.firebaseapp.com",
        databaseURL: "https://unlimited-73d64-default-rtdb.firebaseio.com",
        projectId: "unlimited-73d64",
        storageBucket: "unlimited-73d64.firebasestorage.app",
        messagingSenderId: "1089467648940",
        appId: "1:1089467648940:web:ed748a5a93b27ee408c809"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Load & Update Settings
    db.ref('settings/withdraw').on('value', snap => {
        if(snap.exists()){
            const s = snap.val();
            document.getElementById('minRecharge').value = s.minRecharge;
            document.getElementById('minNagad').value = s.minNagad;
            document.getElementById('minBkash').value = s.minBkash;
            document.getElementById('minRef').value = s.minRef;
        }
    });

    function updateSettings() {
        const data = {
            minRecharge: parseInt(document.getElementById('minRecharge').value) || 20,
            minNagad: parseInt(document.getElementById('minNagad').value) || 40,
            minBkash: parseInt(document.getElementById('minBkash').value) || 60,
            minRef: parseInt(document.getElementById('minRef').value) || 0
        };
        db.ref('settings/withdraw').update(data).then(() => alert("Settings Updated!"));
    }

    // 2. Load Withdrawal Requests
    db.ref('withdrawals').orderByChild('status').equalTo('pending').on('value', snap => {
        const list = document.getElementById('withdrawList');
        list.innerHTML = "<h4>Pending Requests</h4>";
        
        if(!snap.exists()){
            list.innerHTML += "<p style='color:#555'>No pending withdrawals.</p>";
            return;
        }

        snap.forEach(child => {
            const w = child.val();
            const id = child.key;
            const methodClass = `tag-${w.method.toLowerCase()}`;

            const card = document.createElement('div');
            card.className = 'req-card';
            card.innerHTML = `
                <span class="method-tag ${methodClass}">${w.method}</span>
                <div class="req-info">
                    <b>Amount:</b> ৳${w.amount} <br>
                    <b>Target Number:</b> ${w.number} <br>
                    <b>User:</b> ${w.userName} (${w.userNumber}) <br>
                    <b>UID:</b> ${w.uid}
                </div>
                <button class="paid-btn" id="pbtn_${id}" onclick="markAsPaid('${id}', '${w.uid}', ${w.amount})">MARK AS PAID</button>
            `;
            list.appendChild(card);
        });
    });

    // 3. Mark As Paid Logic
    function markAsPaid(id, userUid, amount) {
        const btn = document.getElementById(`pbtn_${id}`);
        btn.disabled = true;
        btn.innerText = "Processing...";

        // 2-second lock as requested
        setTimeout(() => {
            // Update Status in Withdrawals Node
            db.ref('withdrawals/' + id).update({
                status: 'paid',
                paidAt: Date.now()
            }).then(() => {
                // Add to user's history
                db.ref('history/' + userUid).push({
                    type: "Withdrawal Paid",
                    amount: amount,
                    status: "Success",
                    timestamp: Date.now()
                });
                console.log("Payment marked as success");
            });
        }, 2000);
    }

    // Voice Alert
    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        window.speechSynthesis.speak(msg);
    }

    let lastWCount = 0;
    db.ref('withdrawals').orderByChild('status').equalTo('pending').on('value', snap => {
        const count = snap.numChildren();
        if(count > lastWCount) {
            speak("User withdraw-er jon-no apply kor-e-che");
        }
        lastWCount = count;
    });

</script>
</body>
</html>
