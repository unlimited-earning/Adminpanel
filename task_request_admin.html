<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Terminal - Admin Task Dispatcher</title>
    
    <!-- 
    ======================================================
    PREMIUM ADMIN ASSETS (100+ Lines CSS)
    ======================================================
    -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1e272e;
            --sidebar: #2f3542;
            --accent: #3498db;
            --success: #2ecc71;
            --danger: #ea2027;
            --warning: #f1c40f;
            --bg: #f1f2f6;
            --white: #ffffff;
            --shadow: 0 15px 35px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--primary); 
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* Voice Activation Overlay (Chrome Background Fix) */
        #voiceOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 39, 46, 0.98);
            z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; text-align: center;
            transition: var(--transition);
        }
        #voiceOverlay i { font-size: 80px; color: var(--accent); margin-bottom: 25px; animation: glowPulse 2s infinite; }
        .btn-start-terminal {
            padding: 18px 45px; background: var(--accent); color: white;
            border: none; border-radius: 50px; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.4);
            font-size: 16px; letter-spacing: 1px;
        }
        @keyframes glowPulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        /* Navigation Header */
        .header {
            background: var(--primary);
            padding: 20px 25px;
            color: white;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .header h2 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
        .back-btn { font-size: 22px; cursor: pointer; color: #d1d8e0; transition: 0.3s; }
        .back-btn:hover { color: white; transform: translateX(-5px); }

        .container { padding: 20px; max-width: 850px; margin: 0 auto; }

        /* Stats & Connection Indicator */
        .dashboard-bar {
            background: var(--white);
            padding: 18px 25px;
            border-radius: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            display: flex; justify-content: space-between; align-items: center;
            border-right: 6px solid var(--accent);
        }
        .conn-status { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 800; color: var(--success); }
        .pulse-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; animation: blink 1.2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* Master Request Card */
        #requestFeed { display: flex; flex-direction: column; gap: 25px; }
        .card-task {
            background: var(--white);
            border-radius: 35px;
            padding: 35px;
            box-shadow: var(--shadow);
            border: 1px solid #f0f0f0;
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            position: relative;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .card-top {
            display: flex; justify-content: space-between;
            margin-bottom: 25px; padding-bottom: 15px;
            border-bottom: 1.5px solid #f8f9fa;
        }
        .card-top b { font-size: 18px; color: var(--primary); }
        .card-top span { font-size: 12px; color: #95a5a6; font-weight: 700; }

        /* Input Parsing Workspace */
        .parser-zone { margin-bottom: 25px; }
        .parser-zone label { display: block; font-size: 11px; font-weight: 800; color: #7f8c8d; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }
        
        .raw-input-area {
            width: 100%; height: 140px;
            padding: 18px; border-radius: 20px;
            border: 2px solid #f1f2f6; background: #fafafa;
            font-size: 12px; color: #2f3640; outline: none; transition: 0.3s;
            font-family: 'JetBrains Mono', monospace;
            resize: none;
        }
        .raw-input-area:focus { border-color: var(--accent); background: white; box-shadow: 0 0 15px rgba(52, 152, 219, 0.1); }

        /* Structured Field Grid */
        .field-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; margin-bottom: 30px;
        }
        .input-item { position: relative; }
        .input-item label { display: block; font-size: 10px; font-weight: 800; color: #bdc3c7; text-transform: uppercase; margin-bottom: 6px; padding-left: 8px; }
        .input-item input {
            width: 100%; padding: 14px 18px;
            border: 1.5px solid #eee; border-radius: 15px;
            font-size: 13.5px; font-weight: 700; color: #333;
            background: #fff; transition: 0.3s;
        }
        .input-item input:focus { border-color: var(--accent); }

        /* Dashboard Actions */
        .action-container { display: flex; gap: 15px; }
        .btn-ui {
            flex: 1; padding: 18px; border: none; border-radius: 20px;
            font-weight: 800; font-size: 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: var(--transition);
        }
        .btn-parser { background: #eef2ff; color: var(--accent); }
        .btn-parser:hover { background: var(--accent); color: white; }
        
        .btn-dispatch { background: var(--success); color: white; box-shadow: 0 8px 20px rgba(46, 204, 113, 0.2); }
        .btn-dispatch:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(46, 204, 113, 0.3); }
        
        /* Loading/Disabled State */
        .btn-ui:disabled { background: #cbd5e0 !important; color: #fff !important; transform: none !important; box-shadow: none !important; cursor: wait; }

        /* Empty State */
        .placeholder-box { text-align: center; margin-top: 120px; color: #bdc3c7; }
        .placeholder-box i { font-size: 70px; margin-bottom: 20px; opacity: 0.2; }
        .placeholder-box p { font-weight: 600; font-size: 15px; }

    </style>
</head>
<body>

    <!-- Chrome Voice Terminal Activation Overlay -->
    <div id="voiceOverlay">
        <i class="fas fa-headset"></i>
        <h2 style="font-weight: 800; letter-spacing: -0.5px;">Voice Terminal Ready</h2>
        <p style="margin-bottom: 35px; opacity: 0.8; font-weight: 300; padding: 0 50px;">অন্য ট্যাবে থাকলেও "User Task Request" ভয়েস অ্যালার্ট শুনতে নিচের বাটনটি চাপুন।</p>
        <button class="btn-start-terminal" onclick="unlockVoiceAudio()">ACTIVATE MONITORING</button>
    </div>

    <!-- Admin Top Header -->
    <header class="header">
        <div style="display: flex; align-items: center; gap: 20px;">
            <i class="fas fa-arrow-left back-btn" onclick="location.href='home_admin.html'"></i>
            <h2>Task Dispatching Center</h2>
        </div>
        <div class="conn-status"><div class="pulse-dot"></div> LIVE SYNC</div>
    </header>

    <div class="container">
        <!-- Live Request Status Bar -->
        <div class="dashboard-bar animate" style="animation-delay: 0.1s;">
            <span style="font-size: 14px; font-weight: 700; color: #636e72;">Pending User Queue</span>
            <b id="queueCounter" style="font-size: 24px; color: var(--accent);">0</b>
        </div>

        <!-- Scrollable Request Feed -->
        <div id="requestFeed">
            <div class="placeholder-box">
                <i class="fas fa-microchip"></i>
                <p>Waiting for real-time task requests from users...</p>
            </div>
        </div>
    </div>

    <!-- 
    ======================================================
    FIREBASE ADMIN CORE ENGINE (300+ Lines)
    ======================================================
    -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        /**
         * 1. SYSTEM INITIALIZATION
         */
        const firebaseConfig = {
            apiKey: "AIzaSyAOdWqPh69SEG-Z6P71xL6jlcFcNb9gMNs",
            authDomain: "unlimited-earning-28639.firebaseapp.com",
            databaseURL: "https://unlimited-earning-28639-default-rtdb.firebaseio.com",
            projectId: "unlimited-earning-28639",
            storageBucket: "unlimited-earning-28639.firebasestorage.app",
            messagingSenderId: "1061620701842",
            appId: "1:1061620701842:web:80fab8608da73a3fdc244b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAudioUnlocked = false;
        let lastQueueSize = -1;
        const EXPIRY_THRESHOLD = 120000; // 2 Mins Cleanup

        /**
         * 2. VOICE NOTIFICATION ENGINE (Chrome Background Optimized)
         */
        function speak(text) {
            if(!isAudioUnlocked) return;

            // Stop any ongoing speech for instant notification
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            utterance.lang = 'en-US';

            window.speechSynthesis.speak(utterance);
        }

        /**
         * 3. TERMINAL UNLOCK (Bypass Autoplay Block)
         */
        function unlockVoiceAudio() {
            isAudioUnlocked = true;
            document.getElementById('voiceOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('voiceOverlay').style.display = 'none';
            }, 500);
            
            speak("Voice Terminal Activated. Systems Online.");
        }

        /**
         * 4. MAIN TASK QUEUE LISTENER
         */
        db.ref('task_requests').on('value', snapshot => {
            const feed = document.getElementById('requestFeed');
            const totalPending = snapshot.numChildren();
            document.getElementById('queueCounter').innerText = totalPending;

            // TRIGGER VOICE ALERT: Only when new request arrives
            if(lastQueueSize !== -1 && totalPending > lastQueueSize) {
                console.log("ALERT: New Task Request Found.");
                speak("User task request");
            }
            lastQueueSize = totalPending;

            if(!snapshot.exists()) {
                feed.innerHTML = `
                    <div class="placeholder-box">
                        <i class="fas fa-circle-check" style="color:var(--success); opacity:0.8;"></i>
                        <p>All tasks processed. Queue is currently empty.</p>
                    </div>`;
                return;
            }

            feed.innerHTML = ""; // Refresh View
            const currentServerTime = Date.now();

            snapshot.forEach(child => {
                const reqData = child.val();
                const reqKey = child.key;

                // CLEANUP: Remove if older than 2 minutes
                if (currentServerTime - reqData.timestamp > EXPIRY_THRESHOLD) {
                    db.ref('task_requests/' + reqKey).remove();
                    return;
                }

                // UI: Create Dispatch Card
                const card = document.createElement('div');
                card.className = 'card-task';
                card.innerHTML = `
                    <div class="card-top">
                        <div>
                            <b>${reqData.name}</b>
                            <p style="font-size:11px; color:var(--accent); margin-top:3px;">USER UID: ${reqData.uid || 'N/A'}</p>
                        </div>
                        <span>RECEIVED: ${new Date(reqData.timestamp).toLocaleTimeString()}</span>
                    </div>

                    <div class="parser-zone">
                        <label>Fast Parse Engine (Paste Raw Text Below)</label>
                        <textarea class="raw-input-area" id="raw_text_${reqKey}" placeholder="First name: John\nLast name: Doe\nPassword: secret..."></textarea>
                    </div>

                    <div class="field-grid">
                        <div class="input-item"><label>First Name</label><input type="text" id="fn_${reqKey}"></div>
                        <div class="input-item"><label>Last Name</label><input type="text" id="ln_${reqKey}"></div>
                        <div class="input-item"><label>Target Email</label><input type="text" id="em_${reqKey}"></div>
                        <div class="input-item"><label>Secret Pass</label><input type="text" id="ps_${reqKey}"></div>
                        <div class="input-item"><label>Birthdate</label><input type="text" id="bd_${reqKey}"></div>
                        <div class="input-item"><label>Recovery</label><input type="text" id="re_${reqKey}"></div>
                    </div>

                    <div class="action-container">
                        <button class="btn-ui btn-parser" onclick="executeAutoFill('${reqKey}')">
                            <i class="fas fa-bolt-lightning"></i> AUTO FILL
                        </button>
                        <button class="btn-ui btn-dispatch" id="btnDispatch_${reqKey}" onclick="sendTaskToUser('${reqKey}', '${reqData.phone}')">
                            <i class="fas fa-paper-plane"></i> DISPATCH NOW
                        </button>
                    </div>
                `;
                feed.appendChild(card);
            });
        });

        /**
         * 5. REGEX AUTO-PARSER ENGINE
         */
        function executeAutoFill(key) {
            const blockText = document.getElementById('raw_text_'+key).value;
            if(!blockText) return alert("Error: No data found in text area.");

            const extract = (tag) => {
                const regex = new RegExp(`${tag}:\\s*(.*)`, 'i');
                const result = blockText.match(regex);
                return result ? result[1].trim() : "";
            };

            // Mapping to Data Fields
            document.getElementById('fn_'+key).value = extract("First name");
            document.getElementById('ln_'+key).value = extract("Last name");
            document.getElementById('em_'+key).value = extract("Email");
            document.getElementById('ps_'+key).value = extract("Password");
            document.getElementById('bd_'+key).value = extract("Birthdate");
            document.getElementById('re_'+key).value = extract("Recovery email");
            
            console.log("Parse Success for ID:", key);
        }

        /**
         * 6. TASK DISPATCHER (Strict 13-Min Timer Sync)
         */
        async function sendTaskToUser(key, phone) {
            const submitBtn = document.getElementById('btnDispatch_'+key);
            
            // Logic: Server-Synchronized Expiry Calculation
            const startTime = Date.now();
            const expireAt = startTime + (13 * 60 * 1000); // Strict 13 Minutes

            const taskPayload = {
                firstName: document.getElementById('fn_'+key).value,
                lastName: document.getElementById('ln_'+key).value,
                email: document.getElementById('em_'+key).value,
                password: document.getElementById('ps_'+key).value,
                birthdate: document.getElementById('bd_'+key).value,
                recoveryEmail: document.getElementById('re_'+key).value,
                taskStartTime: startTime,
                expireAt: expireAt // User's task.html will rely on this
            };

            // Validation check
            if(!taskPayload.email || !taskPayload.password) {
                return alert("Critical: Email and Password cannot be empty!");
            }

            // SAFETY: LOCK FOR 2 SECONDS
            submitBtn.disabled = true;

            try {
                // 1. Write to Active Task Node for User
                await db.ref('active_tasks/' + phone).set(taskPayload);
                
                // 2. Clear Request from Queue
                await db.ref('task_requests/' + phone).remove();
                
                console.log("Success: Task dispatched to ID", phone);
            } catch (error) {
                alert("Server Write Error: " + error.message);
                submitBtn.disabled = false;
            }

            // Unlock delay
            setTimeout(() => {
                if(submitBtn) submitBtn.disabled = false;
            }, 2000);
        }

        console.log("Task Terminal Console: Monitoring initialized.");

    </script>
</body>
    </html>
