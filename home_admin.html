<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Sidebar Menu</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --sidebar-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: var(--card-bg);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .menu-toggle {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1001;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
            transition: 0.3s;
        }

        .header h2 { margin: 0; font-size: 18px; flex-grow: 1; text-align: center; color: var(--primary); }

        /* Sidebar Design */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px; /* Hidden initially */
            width: 260px;
            height: 100%;
            background: var(--sidebar-bg);
            z-index: 999;
            transition: 0.4s ease;
            padding-top: 80px;
            border-right: 1px solid #222;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .sidebar.active { left: 0; }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 998;
        }

        .sidebar-overlay.active { display: block; }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 15px;
            border-bottom: 1px solid #1a1a1a;
            position: relative;
            transition: 0.3s;
        }

        .sidebar a:hover, .sidebar a.active-link {
            background: #1a1a1a;
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        .sidebar .badge {
            background: var(--danger);
            color: white;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 10px;
            margin-left: auto;
        }

        /* Stats Section */
        .dashboard-content { padding: 20px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .stat-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .stat-card h3 { margin: 0; font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 12px 0 0; font-size: 22px; font-weight: bold; color: var(--primary); }

        .logout-sidebar {
            background: #221111 !important;
            color: #ff4444 !important;
            margin-top: 30px;
        }

        .admin-only { display: none; } /* Master Admin only links */
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="menu-toggle" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </div>
    <h2 id="roleTitle">ADMIN DASHBOARD</h2>
    <div style="width: 25px;"></div> <!-- Placeholder to center title -->
</div>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar Menu -->
<div class="sidebar" id="sidebar">
    <a href="task_request_admin.html">Task Request <span class="badge" id="side_task_badge">0</span></a>
    <a href="review_admin.html">Review Task <span class="badge" id="side_review_badge">0</span></a>
    <a href="withdrawal_admin.html" class="admin-only">Withdrawals <span class="badge" id="side_withdraw_badge">0</span></a>
    <a href="success_admin.html">Success Section</a>
    <a href="failed_admin.html">Failed Section</a>
    <a href="bonus_admin.html" class="admin-only">Weekly Bonus</a>
    <a href="referral_setting_admin.html" class="admin-only">Referral Settings</a>
    <a href="support_admin.html" class="admin-only">Support Admin Setup</a>
    <a href="uesr_details_admin.html" class="admin-only">User Details</a>
    <a href="uesr_balance_admin.html" class="admin-only">Update Balance</a>
    <a href="#" onclick="logout()" class="logout-sidebar">Logout</a>
</div>

<!-- Main Content -->
<div class="dashboard-content">
    <div class="stats-grid">
        <div class="stat-card"><h3>Total Users</h3><p id="totalUsers">0</p></div>
        <div class="stat-card"><h3>Today Join</h3><p id="todayJoin">0</p></div>
        <div class="stat-card"><h3>Total Balance</h3><p id="totalBalance">৳0</p></div>
        <div class="stat-card"><h3>Today Balance</h3><p id="todayBalance">৳0</p></div>
        <div class="stat-card" style="border-color: #333;"><h3>Pending Task</h3><p id="taskReqCount">0</p></div>
        <div class="stat-card" style="border-color: #333;"><h3>In Review</h3><p id="reviewCount">0</p></div>
        <div class="stat-card" style="border-color: #333;"><h3>Pending Withdraw</h3><p id="withdrawCount">0</p></div>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBFPd0umYUjpFBH08GNhpvjPA00kTh6Y5c",
        authDomain: "unlimited-73d64.firebaseapp.com",
        databaseURL: "https://unlimited-73d64-default-rtdb.firebaseio.com",
        projectId: "unlimited-73d64",
        storageBucket: "unlimited-73d64.firebasestorage.app",
        messagingSenderId: "1089467648940",
        appId: "1:1089467648940:web:ed748a5a93b27ee408c809"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // UI Toggle Function
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    // Auth & Permission Check
    const adminRole = sessionStorage.getItem("adminRole");
    if (sessionStorage.getItem("adminLoggedIn") !== "true") {
        window.location.href = "index_admin.html";
    }

    if (adminRole === "master") {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
        document.getElementById('roleTitle').innerText = "MASTER ADMIN";
    }

    // Voice Notification Function
    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        window.speechSynthesis.speak(msg);
    }

    // Data Listeners
    let lastTask = -1, lastReview = -1, lastWithdraw = -1;

    // Users Stats
    db.ref('users').on('value', snap => {
        const users = snap.val() || {};
        document.getElementById('totalUsers').innerText = Object.keys(users).length;
        
        let todayJ = 0, totalB = 0, todayB = 0;
        const todayStr = new Date().toLocaleDateString();

        Object.values(users).forEach(u => {
            if(u.joinDate === todayStr) todayJ++;
            totalB += (u.balance || 0);
            // Assuming today's income is tracked separately or via history
        });
        document.getElementById('todayJoin').innerText = todayJ;
        document.getElementById('totalBalance').innerText = "৳" + totalB;
    });

    // Task Request Listener
    db.ref('task_requests').on('value', snap => {
        const count = snap.numChildren();
        document.getElementById('taskReqCount').innerText = count;
        document.getElementById('side_task_badge').innerText = count;
        if(lastTask !== -1 && count > lastTask) speak("User task request diy-e-che");
        lastTask = count;
    });

    // Review Listener
    db.ref('task_reviews').on('value', snap => {
        const count = snap.numChildren();
        document.getElementById('reviewCount').innerText = count;
        document.getElementById('side_review_badge').innerText = count;
        if(lastReview !== -1 && count > lastReview) speak("User task submit kor-e-che");
        lastReview = count;
    });

    // Withdraw Listener
    db.ref('withdrawals').orderByChild('status').equalTo('pending').on('value', snap => {
        const count = snap.numChildren();
        document.getElementById('withdrawCount').innerText = count;
        document.getElementById('side_withdraw_badge').innerText = count;
        if(lastWithdraw !== -1 && count > lastWithdraw) speak("User withdraw-er jonno apply kor-e-che");
        lastWithdraw = count;
    });

    function logout() {
        sessionStorage.clear();
        window.location.href = "index_admin.html";
    }
</script>

</body>
</html>
