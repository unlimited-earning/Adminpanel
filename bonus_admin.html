<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonus & Ranking - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --gold: #ffd700;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            padding: 15px;
        }

        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: var(--primary); font-size: 20px; margin-right: 15px; }

        /* Search Section */
        .search-box {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        /* Bonus Giving Area */
        #searchResult { display: none; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        
        .user-details { font-size: 14px; margin-bottom: 10px; }
        .user-details b { color: var(--primary); }

        .bonus-input-group { display: flex; gap: 10px; }
        .bonus-input-group input { flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: #00ff00; border-radius: 5px; font-weight: bold; }
        .bonus-btn { padding: 10px 20px; background: var(--success); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Ranking Section */
        .ranking-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .ranking-card h4 { margin-top: 0; color: var(--gold); border-bottom: 1px solid #222; padding-bottom: 10px; display: flex; justify-content: space-between; }

        .rank-list { width: 100%; border-collapse: collapse; font-size: 13px; }
        .rank-list th, .rank-list td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #222; }
        
        .top-1 { color: var(--gold); font-weight: bold; }
        .rank-num { font-weight: bold; color: var(--text-dim); margin-right: 5px; }

        .give-bonus-small { padding: 5px 8px; background: #333; color: #ddd; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; }

        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="header">
    <a href="home_admin.html" class="back-btn">⬅</a>
    <h3>Bonus & Ranking</h3>
</div>

<!-- Manual Bonus Search -->
<div class="search-box">
    <input type="text" id="userSearch" placeholder="Search User by Name or Number..." oninput="searchUser()">
    
    <div id="searchResult">
        <div class="user-details" id="foundUserInfo"></div>
        <div class="bonus-input-group">
            <input type="number" id="bonusAmt" placeholder="Enter Bonus (৳)">
            <button class="bonus-btn" id="bonusSendBtn" onclick="sendBonus()">SEND BONUS</button>
        </div>
    </div>
</div>

<!-- Weekly Ranking -->
<div class="ranking-card">
    <h4>Weekly Top 10 Referrers <span>🏆</span></h4>
    <table class="rank-list">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Active Ref</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="rankBody">
            <!-- Ranking list loads here -->
        </tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBFPd0umYUjpFBH08GNhpvjPA00kTh6Y5c",
        authDomain: "unlimited-73d64.firebaseapp.com",
        databaseURL: "https://unlimited-73d64-default-rtdb.firebaseio.com",
        projectId: "unlimited-73d64",
        storageBucket: "unlimited-73d64.firebasestorage.app",
        messagingSenderId: "1089467648940",
        appId: "1:1089467648940:web:ed748a5a93b27ee408c809"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let targetUserUid = "";

    // 1. Search User Function
    function searchUser() {
        const query = document.getElementById('userSearch').value.toLowerCase();
        const resDiv = document.getElementById('searchResult');
        
        if(query.length < 3) { resDiv.style.display = "none"; return; }

        db.ref('users').once('value', snap => {
            let found = false;
            snap.forEach(child => {
                const u = child.val();
                if(u.name.toLowerCase().includes(query) || u.number.includes(query)) {
                    found = true;
                    targetUserUid = child.key;
                    document.getElementById('foundUserInfo').innerHTML = `
                        <b>Name:</b> ${u.name} | <b>UID:</b> ${u.uid || 'N/A'}<br>
                        <b>Balance:</b> ৳${u.balance || 0} | <b>Active Ref:</b> ${u.activeReferrals || 0}
                    `;
                    resDiv.style.display = "block";
                }
            });
            if(!found) resDiv.style.display = "none";
        });
    }

    // 2. Send Bonus Logic
    function sendBonus() {
        const amt = parseFloat(document.getElementById('bonusAmt').value) || 0;
        const btn = document.getElementById('bonusSendBtn');

        if(amt <= 0 || !targetUserUid) { alert("Enter valid amount!"); return; }

        btn.disabled = true;
        btn.innerText = "Sending...";

        setTimeout(() => {
            // Update Balance
            db.ref('users/' + targetUserUid).transaction(u => {
                if(u) {
                    u.balance = (u.balance || 0) + amt;
                }
                return u;
            }).then(() => {
                // Add History
                db.ref('history/' + targetUserUid).push({
                    type: "Admin Bonus",
                    amount: amt,
                    status: "Success",
                    timestamp: Date.now()
                });
                alert("Bonus Sent Successfully!");
                document.getElementById('bonusAmt').value = "";
                btn.disabled = false;
                btn.innerText = "SEND BONUS";
            });
        }, 2000);
    }

    // 3. Weekly Ranking Logic (Top 10)
    db.ref('users').on('value', snap => {
        const rankBody = document.getElementById('rankBody');
        rankBody.innerHTML = "";
        
        let usersArr = [];
        snap.forEach(child => {
            const u = child.val();
            u.id = child.key;
            usersArr.push(u);
        });

        // Sort by activeReferrals descending
        usersArr.sort((a, b) => (b.activeReferrals || 0) - (a.activeReferrals || 0));

        // Get Top 10
        const top10 = usersArr.slice(0, 10);

        top10.forEach((u, index) => {
            const tr = document.createElement('tr');
            if(index === 0) tr.className = "top-1";
            
            tr.innerHTML = `
                <td><span class="rank-num">#${index+1}</span></td>
                <td>${u.name}</td>
                <td>${u.activeReferrals || 0}</td>
                <td>
                    <button class="give-bonus-small" onclick="quickBonus('${u.id}', '${u.name}')">GIVE BONUS</button>
                </td>
            `;
            rankBody.appendChild(tr);
        });
    });

    // Quick Bonus from Ranking
    function quickBonus(uid, name) {
        const amt = prompt(`Enter Weekly Bonus Amount for ${name}:`);
        if(!amt || isNaN(amt)) return;

        // Perform the same bonus logic
        db.ref('users/' + uid).transaction(u => {
            if(u) u.balance = (u.balance || 0) + parseFloat(amt);
            return u;
        }).then(() => {
            db.ref('history/' + uid).push({
                type: "Weekly Ranking Bonus",
                amount: parseFloat(amt),
                status: "Success",
                timestamp: Date.now()
            });
            alert("Weekly Bonus Sent!");
        });
    }

</script>

</body>
</html>
