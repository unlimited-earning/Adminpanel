<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Admin Setup - Unlimited Earning</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            padding: 15px;
        }

        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: var(--primary); font-size: 20px; margin-right: 15px; }

        .form-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 30px;
        }

        .form-card h4 { margin-top: 0; color: var(--primary); border-bottom: 1px solid #222; padding-bottom: 10px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 5px; }
        .input-group input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }

        /* Panel Checkboxes */
        .panel-choice {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
            background: #222;
            padding: 10px;
            border-radius: 8px;
        }

        .panel-choice label {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

        .add-btn:disabled { background: #444; }

        /* Admin List Table */
        .list-container { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            font-size: 13px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #222;
        }

        th { color: var(--text-dim); background: #222; }

        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .online { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .offline { background: #555; }

        .panel-tag {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 10px;
            margin-right: 3px;
            color: var(--primary);
        }

        .del-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="header">
    <a href="home_admin.html" class="back-btn">⬅</a>
    <h3>Support Admin Setup</h3>
</div>

<!-- Create Admin Form -->
<div class="form-card">
    <h4>Create Support Admin</h4>
    <div class="input-group">
        <label>Admin Number</label>
        <input type="text" id="supNumber" placeholder="017xxxxxxxx">
    </div>
    <div class="input-group">
        <label>Set Password</label>
        <input type="text" id="supPass" placeholder="Password">
    </div>
    
    <label style="font-size: 13px; color: var(--text-dim);">Select Accessible Panels:</label>
    <div class="panel-choice" id="panelCheckboxes">
        <label><input type="checkbox" value="task_request" checked> Task Request</label>
        <label><input type="checkbox" value="review"> Review Task</label>
        <label><input type="checkbox" value="success"> Success Section</label>
        <label><input type="checkbox" value="failed"> Failed Section</label>
    </div>

    <button class="add-btn" id="addBtn" onclick="addSupportAdmin()">ADD SUPPORT ADMIN</button>
</div>

<!-- Admin List -->
<h4>Existing Support Admins</h4>
<div class="list-container">
    <table>
        <thead>
            <tr>
                <th>Admin</th>
                <th>Status</th>
                <th>Access</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="supportList">
            <!-- List will load here -->
        </tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBFPd0umYUjpFBH08GNhpvjPA00kTh6Y5c",
        authDomain: "unlimited-73d64.firebaseapp.com",
        databaseURL: "https://unlimited-73d64-default-rtdb.firebaseio.com",
        projectId: "unlimited-73d64",
        storageBucket: "unlimited-73d64.firebasestorage.app",
        messagingSenderId: "1089467648940",
        appId: "1:1089467648940:web:ed748a5a93b27ee408c809"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Add Support Admin Logic
    function addSupportAdmin() {
        const number = document.getElementById('supNumber').value.trim();
        const pass = document.getElementById('supPass').value.trim();
        const btn = document.getElementById('addBtn');
        
        // Get checked panels
        const selectedPanels = [];
        document.querySelectorAll('#panelCheckboxes input:checked').forEach(cb => {
            selectedPanels.push(cb.value);
        });

        if(!number || !pass || selectedPanels.length === 0) {
            alert("Fill all fields and select at least one panel!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processing...";

        // 2-second lock
        setTimeout(() => {
            const newAdmin = {
                number: number,
                password: pass,
                panels: selectedPanels,
                lastActive: 0, // 0 means never
                createdAt: Date.now()
            };

            db.ref('support_admins').push(newAdmin).then(() => {
                alert("Support Admin Added!");
                document.getElementById('supNumber').value = "";
                document.getElementById('supPass').value = "";
                btn.disabled = false;
                btn.innerText = "ADD SUPPORT ADMIN";
            });
        }, 2000);
    }

    // 2. Load and Display Admins
    db.ref('support_admins').on('value', snap => {
        const list = document.getElementById('supportList');
        list.innerHTML = "";

        if(!snap.exists()) {
            list.innerHTML = "<tr><td colspan='4' style='text-align:center'>No admins found</td></tr>";
            return;
        }

        snap.forEach(child => {
            const admin = child.val();
            const id = child.key;
            
            // Online status logic (if last active was within last 5 mins)
            const isOnline = (Date.now() - admin.lastActive) < 300000;
            const statusClass = isOnline ? 'online' : 'offline';

            const panelTags = admin.panels.map(p => `<span class="panel-tag">${p}</span>`).join("");

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <b>${admin.number}</b><br>
                    <small style="color:#666">P: ${admin.password}</small>
                </td>
                <td>
                    <span class="status-dot ${statusClass}"></span>
                    ${isOnline ? 'Active' : 'Idle'}
                </td>
                <td>${panelTags}</td>
                <td>
                    <button class="del-btn" id="del_${id}" onclick="deleteAdmin('${id}')">DEL</button>
                </td>
            `;
            list.appendChild(tr);
        });
    });

    // 3. Delete Admin Logic
    function deleteAdmin(id) {
        if(!confirm("Are you sure you want to delete this admin?")) return;
        
        const btn = document.getElementById(`del_${id}`);
        btn.disabled = true;

        setTimeout(() => {
            db.ref('support_admins').child(id).remove().then(() => {
                console.log("Admin deleted");
            });
        }, 2000);
    }

</script>

</body>
</html>
