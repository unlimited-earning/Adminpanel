<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            padding: 15px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: var(--dark-bg);
            padding: 10px 0;
            z-index: 100;
        }

        .back-btn { text-decoration: none; color: var(--primary); font-size: 20px; }

        .search-container input {
            width: 100%;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
        }

        .count-box { font-size: 14px; color: var(--text-dim); margin-bottom: 10px; }

        .user-list { display: flex; flex-direction: column; gap: 15px; }

        .user-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #222;
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .user-name { font-weight: bold; color: var(--primary); font-size: 16px; margin: 0; }
        .user-uid { font-size: 11px; color: #555; }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 13px;
        }

        .detail-item span { color: #555; font-size: 11px; display: block; }
        .detail-item b { color: #ddd; }

        .password-box { color: #ff9800 !important; font-family: monospace; }

        /* Action Buttons */
        .status-badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .active-bg { background: rgba(40, 167, 69, 0.15); color: #28a745; }
        .unactive-bg { background: rgba(220, 53, 69, 0.15); color: #dc3545; }

        .action-btn {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-activate { background: var(--success); color: white; }
        .btn-deactivate { background: var(--danger); color: white; }
        
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    </style>
</head>
<body>

<div class="header">
    <a href="home_admin.html" class="back-btn">⬅</a>
    <h3 style="margin:0">User Details</h3>
    <div style="width:20px"></div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search by Name, Number or UID..." oninput="filterUsers()">
</div>

<div class="count-box">Total Users: <b id="totalCount" style="color:var(--primary)">0</b></div>

<div class="user-list" id="userContainer">
    <!-- Users will load here -->
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBFPd0umYUjpFBH08GNhpvjPA00kTh6Y5c",
        authDomain: "unlimited-73d64.firebaseapp.com",
        databaseURL: "https://unlimited-73d64-default-rtdb.firebaseio.com",
        projectId: "unlimited-73d64",
        storageBucket: "unlimited-73d64.firebasestorage.app",
        messagingSenderId: "1089467648940",
        appId: "1:1089467648940:web:ed748a5a93b27ee408c809"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allUsers = [];

    // 1. Fetch Users
    db.ref('users').on('value', snap => {
        allUsers = [];
        if(snap.exists()){
            snap.forEach(child => {
                const data = child.val();
                data.key = child.key;
                allUsers.push(data);
            });
        }
        document.getElementById('totalCount').innerText = allUsers.length;
        renderUsers(allUsers);
    });

    // 2. Render Function
    function renderUsers(users) {
        const container = document.getElementById('userContainer');
        container.innerHTML = "";

        users.forEach(u => {
            const isActive = u.status === 'active';
            const badgeClass = isActive ? 'active-bg' : 'unactive-bg';
            const btnText = isActive ? 'DEACTIVATE ACCOUNT' : 'ACTIVATE ACCOUNT';
            const btnClass = isActive ? 'btn-deactivate' : 'btn-activate';

            const card = document.createElement('div');
            card.className = 'user-card';
            card.innerHTML = `
                <div class="card-header">
                    <div>
                        <p class="user-name">${u.name}</p>
                        <span class="user-uid">UID: ${u.uid}</span>
                    </div>
                    <span class="status-badge ${badgeClass}">${u.status || 'unactive'}</span>
                </div>
                <div class="details-grid">
                    <div class="detail-item"><span>Number</span><b>${u.number}</b></div>
                    <div class="detail-item"><span>Balance</span><b style="color:#00ff00">৳${u.balance || 0}</b></div>
                    <div class="detail-item"><span>Password</span><b class="password-box">${u.password}</b></div>
                    <div class="detail-item"><span>Active Referrals</span><b>${u.activeReferrals || 0}</b></div>
                </div>
                <button class="action-btn ${btnClass}" id="btn_${u.key}" onclick="toggleStatus('${u.key}', '${u.status}')">
                    ${btnText}
                </button>
            `;
            container.appendChild(card);
        });
    }

    // 3. Toggle Status Logic
    function toggleStatus(userKey, currentStatus) {
        const btn = document.getElementById(`btn_${userKey}`);
        const newStatus = currentStatus === 'active' ? 'unactive' : 'active';
        
        if(!confirm(`Are you sure you want to ${newStatus} this account?`)) return;

        btn.disabled = true;
        btn.innerText = "Processing...";

        // 2-second lock
        setTimeout(() => {
            db.ref('users/' + userKey).update({
                status: newStatus
            }).then(() => {
                console.log("Status updated to " + newStatus);
            });
        }, 2000);
    }

    // 4. Filter Function
    function filterUsers() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allUsers.filter(u => 
            u.name.toLowerCase().includes(q) || 
            u.number.includes(q) || 
            u.uid.toLowerCase().includes(q)
        );
        renderUsers(filtered);
    }

</script>

</body>
</html>
